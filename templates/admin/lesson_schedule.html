<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Lesson Schedule</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6fb;
        font-family:Inter,sans-serif;
        margin:0;
        }

        /* HEADER */

        .header{
        position:fixed;
        top:0;
        left:0;
        right:0;

        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:14px 16px;

        background:white;

        box-shadow:0 2px 10px rgba(0,0,0,.06);

        z-index:1000;
        }

        .title{
        font-weight:600;
        font-size:18px;
        }

        .add-btn{
        border-radius:10px;
        }

        /* PAGE */

        .page{
        margin-top:70px;
        padding:14px;
        max-width:1100px;
        margin-left:auto;
        margin-right:auto;
        }

        /* CARD */

        .filter-card,
        .curriculum-card{
        background:white;
        padding:16px;
        border-radius:16px;
        box-shadow:0 4px 15px rgba(0,0,0,.05);
        margin-bottom:16px;
        }

        /* TABLE */

        .table-responsive{
        overflow-x:hidden;
        }

        .curriculum-table{
        width:100%;
        table-layout:fixed;
        }

        .curriculum-table th,
        .curriculum-table td{
        word-wrap:break-word;
        white-space:normal;
        }

        .curriculum-table th{
        font-size:14px;
        color:#666;
        font-weight:600;
        }

        .curriculum-table td{
        vertical-align:middle;
        }

        .edit-btn{
        border-radius:8px;
        }

        /* DROP AREA */

        .drop-area{
        border:2px dashed #cbd5e1;
        border-radius:12px;
        padding:30px;
        text-align:center;
        cursor:pointer;
        background:#f9fafc;
        }

        /* MOBILE IMPROVEMENTS */

        @media (max-width:768px){

        .header{
        padding:12px;
        }

        .title{
        font-size:16px;
        }

        }

    </style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="title">
        Lesson Schedule
    </div>

    <button class="btn btn-success add-btn"
            data-bs-toggle="modal"
            data-bs-target="#uploadModal">

        <i class="bi bi-plus-lg"></i>

    </button>

</div>

<div class="page">

    <!-- FILTERS -->

    <div class="filter-card">

        <div class="row g-2">

            <div class="col-md-4">

                <select class="form-select">
                    <option>Select Class</option>
                    <option>Class 1</option>
                    <option>Class 2</option>
                    <option>Class 3</option>
                </select>

            </div>

            <div class="col-md-4">

                <input type="date" class="form-control">

            </div>

            <div class="col-md-4">

                <button class="btn btn-success w-100">
                    Search
                </button>

            </div>

        </div>

    </div>

    <!-- CURRICULUM TABLE -->

    <div class="curriculum-card">

        <div class="table-responsive">

            <table class="table curriculum-table align-middle">

                <thead>

                <tr>
                    <th style="width:30%;">Subject</th>
                    <th style="width:50%;">Topic</th>
                    <th style="width:20%;" class="text-end">Action</th>
                </tr>

                </thead>

                <tbody>

                <tr>

                    <td>Arabic</td>

                    <td>Alif Ba Ta Lesson 3dfdfdfdfdfdfdfd</td>

                    <td class="text-end">

                        <button class="btn btn-success btn-sm edit-btn"
                                data-bs-toggle="modal"
                                data-bs-target="#editModal">

                            Edit

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>Bangla</td>

                    <td>Poem Reading</td>

                    <td class="text-end">

                        <button class="btn btn-success btn-sm edit-btn"
                                data-bs-toggle="modal"
                                data-bs-target="#editModal">

                            Edit

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>English</td>

                    <td>Verb Tense Practice</td>

                    <td class="text-end">

                        <button class="btn btn-success btn-sm edit-btn"
                                data-bs-toggle="modal"
                                data-bs-target="#editModal">

                            Edit

                        </button>

                    </td>

                </tr>

                <tr>

                    <td>Math</td>

                    <td>Addition Exercise</td>

                    <td class="text-end">

                        <button class="btn btn-success btn-sm edit-btn"
                                data-bs-toggle="modal"
                                data-bs-target="#editModal">

                            Edit

                        </button>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- UPLOAD MODAL -->

<div class="modal fade" id="uploadModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Upload Curriculum
                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form>

                    <div class="mb-3">

                        <label class="form-label">
                            Class
                        </label>

                        <select class="form-select">

                            <option>Select Class</option>
                            <option>Class 1</option>
                            <option>Class 2</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Subject
                        </label>

                        <select class="form-select">

                            <option>Arabic</option>
                            <option>Bangla</option>
                            <option>English</option>
                            <option>Math</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Upload Excel
                        </label>

                        <div class="drop-area">

                            <i class="bi bi-cloud-upload fs-2"></i>

                            <p class="mt-2">
                                Drag & Drop Excel file
                            </p>

                            <input type="file" class="form-control mt-2">

                        </div>

                    </div>

                    <button class="btn btn-success w-100">
                        Submit
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- EDIT MODAL -->

<div class="modal fade" id="editModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Edit Curriculum
                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form>

                    <div class="mb-3">

                        <label class="form-label">
                            Class
                        </label>

                        <select class="form-select">

                            <option>Class 1</option>
                            <option>Class 2</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Subject
                        </label>

                        <select class="form-select">

                            <option>Arabic</option>
                            <option>Bangla</option>
                            <option>English</option>
                            <option>Math</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Date
                        </label>

                        <input type="date" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Topic
                        </label>

                        <input type="text"
                               class="form-control"
                               value="Sample Topic">

                    </div>

                    <button class="btn btn-success w-100">
                        Update
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
