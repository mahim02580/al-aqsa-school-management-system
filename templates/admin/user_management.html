<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>User Management</title>

    <link href="{{url_for('static', filename='/img/al-aqsa-icon.jpg')}}" rel="icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6fb;
        font-family:Inter,sans-serif;
        margin:0;
        }

        /* HEADER */

        .header{
        position:fixed;
        top:0;
        left:0;
        right:0;
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:14px 16px;
        background:white;
        box-shadow:0 2px 10px rgba(0,0,0,.06);
        z-index:1000;
        }

        .title{
        font-weight:600;
        font-size:18px;
        }

        .page{
        margin-top:70px;
        padding:14px;
        max-width:1100px;
        margin:auto;
        }

        .filter-card,
        .table-card{
        background:white;
        padding:16px;
        border-radius:16px;
        box-shadow:0 4px 15px rgba(0,0,0,.05);
        margin-bottom:16px;
        }

        .option-check{
        transform:scale(1.2);
        }

        .action-icon{
        cursor:pointer;
        font-size:18px;
        margin-left:10px;
        }

    </style>

</head>

<body>

<div class="container p-0">

    <!-- HEADER -->

    <div class="header">

        <div class="title">User Management</div>

        <button class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#addUserModal">

            <i class="bi bi-plus-lg"></i>

        </button>

    </div>


    <div class="page" style="margin-top:90px;">

        <!-- FILTERS -->

        <div class="filter-card">

            <div class="row g-2">

                <div class="col-md-4">
                    <select id="branchFilter" class="form-select">
                        <option value="">Select Branch</option>
                        <option value="Netrakona">Netrakona</option>
                        <option value="Purbadhala">Purbadhala</option>
                        <option value="Kolmakanda">Kalmakanda</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <select id="roleFilter" class="form-select">
                        <option value="">Select Role</option>
                        <option>Service Admin</option>
                        <option>Teacher</option>
                        <option>Guardian</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <input id="idFilter" type="text" placeholder="School ID" class="form-control">
                </div>

                <div class="col-md-2">
                    <button id="searchBtn" class="btn btn-success w-100">Search</button>
                </div>

            </div>

        </div>


        <!-- TABLE -->

        <div id="tableSection" class="table-card d-none">

            <div class="table-responsive">

                <table class="table align-middle">

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Branch</th>
                        <th class="text-end">Actions</th>
                    </tr>

                    </thead>

                    <tbody id="userTable"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>


<!-- ADD USER MODAL -->
<div class="modal fade" id="addUserModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add User</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="addUserForm">

                    <div class="mb-2">
                        <input name="id" placeholder="School ID" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <input name="username" placeholder="Username" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <input name="password" type="password" placeholder="Password" class="form-control" required>
                    </div>

                    <!-- ROLE BUTTON GROUP -->
                    <label class="form-label">Role</label>
                    <div class="btn-group w-100 mb-3" role="group">
                        <input type="radio" class="btn-check" name="role" id="admin" value="Service Admin" checked>
                        <label class="btn btn-outline-success role-btn" for="admin">Service Admin</label>

                        <input type="radio" class="btn-check" name="role" id="teacher" value="Teacher">
                        <label class="btn btn-outline-success role-btn" for="teacher">Teacher</label>

                        <input type="radio" class="btn-check" name="role" id="guardian" value="Guardian">
                        <label class="btn btn-outline-success role-btn" for="guardian">Guardian</label>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Branch</label>
                        <select name="branch" class="form-select">
                            <option>Select Branch</option>
                            <option>Netrakona</option>
                            <option>Purbadhala</option>
                            <option>Kolmakanda</option>
                        </select>
                    </div>

                    <label class="form-label">Option Access</label>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="lesson_schedule"
                                       id="opt_lesson">
                                <label class="form-check-label" for="opt_lesson">Lesson Schedule</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="attendance"
                                       id="opt_attendance">
                                <label class="form-check-label" for="opt_attendance">Attendance</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="accounts"
                                       id="opt_accounts">
                                <label class="form-check-label" for="opt_accounts">Accounts</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="result"
                                       id="opt_result">
                                <label class="form-check-label" for="opt_result">Result</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="qr_code"
                                       id="opt_qr">
                                <label class="form-check-label" for="opt_qr">QR Code</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-success w-100 mt-2">Add User</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- EDIT USER MODAL -->

<div class="modal fade" id="editUserModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Edit User</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form id="editUserForm">

                    <input id="db_id" name="db_id" type="hidden">
                    <div class="mb-2">
                        <label class="form-label">School ID</label>
                        <input id="edit_id" name="id" placeholder="School ID" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Username</label>
                        <input id="edit_username" class="form-control">
                    </div>


                    <div class="mb-2">
                        <label for="edit_branch" class="form-label">Branch</label>
                        <select id="edit_branch" class="form-select">
                            <option>Netrakona</option>
                            <option>Purbadhala</option>
                            <option>Kolmakanda</option>
                        </select>
                    </div>

                    <label class="form-label">Option Access</label>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="lesson_schedule"
                                       id="edit_opt_lesson">
                                <label class="form-check-label" for="edit_opt_lesson">Lesson Schedule</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="attendance"
                                       id="edit_opt_attendance">
                                <label class="form-check-label" for="edit_opt_attendance">Attendance</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="accounts"
                                       id="edit_opt_accounts">
                                <label class="form-check-label" for="edit_opt_accounts">Accounts</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="result"
                                       id="edit_opt_result">
                                <label class="form-check-label" for="edit_opt_result">Result</label>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="options" value="qr_code"
                                       id="edit_opt_qr">
                                <label class="form-check-label" for="edit_opt_qr">QR Code</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-success w-100" >Update</button>

                </form>
            </div>

        </div>

    </div>

</div>


<!-- CHANGE PASSWORD MODAL -->

<div class="modal fade" id="passwordModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Change Password</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form id="passwordForm">

                    <input type="hidden" id="password_user_id">

                    <div class="mb-3">
                        <input type="password" id="new_password" placeholder="New Password" class="form-control">
                    </div>

                    <button class="btn btn-success w-100">Confirm</button>

                </form>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById("addUserForm").addEventListener("submit", async function(e) {
    e.preventDefault(); // Prevent the form from refreshing the page

    const form = e.target;

    // Collect form data
    const id = form.id.value.trim();
    const username = form.username.value.trim();
    const password = form.password.value.trim();
    const role = form.role.value;
    const branch = form.branch.value;

    // Collect option checkboxes
    const options = {};
    form.querySelectorAll("input[name='options']").forEach(opt => {
        options[opt.value] = opt.checked;
    });

    // Validate required fields
    if (!id || !username || !password || !role || branch === "Select Branch") {
        alert("Please fill all required fields");
        return;
    }

    // Send data to the server
    try {
        const res = await fetch("/api/add-user", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, username, password, role, branch, ...options })
        });

        const data = await res.json();

        if (data.success) {
            alert("User added successfully!");

            // Close modal
            const addModal = bootstrap.Modal.getInstance(document.getElementById("addUserModal"));
            addModal.hide();

            // Reset form
            form.reset();
            form.role[0].checked = true; // reset role to default

            // Refresh table
            document.getElementById("searchBtn").click();
        } else {
            alert("Error: " + (data.error || "Could not add user"));
        }
    } catch (err) {
        console.error(err);
        alert("An unexpected error occurred");
    }
});


    document.getElementById("searchBtn").addEventListener("click",async function(){

    const branch=document.getElementById("branchFilter").value
    const role=document.getElementById("roleFilter").value
    const id=document.getElementById("idFilter").value

    const res=await fetch("/api/search-users",{

    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({branch,role,id})

    })

    const data=await res.json()
    document.getElementById("tableSection").classList.remove("d-none")

    const table=document.getElementById("userTable")
    table.innerHTML=""

    data.users.forEach(u=>{

    table.innerHTML+=`

    <tr>
        <td>${u.id}</td>
        <td>${u.username}</td>
        <td>${u.role}</td>
        <td>${u.branch}</td>
        <td class="text-end">

            <button class="btn btn-light btn-sm me-1" onclick="openPassword('${u.db_id}')">
            <i class="bi bi-shield-lock"></i>
            </button>

            <button class="btn btn-light btn-sm me-1" onclick='openEdit(${JSON.stringify(u)})'>
            <i class="bi bi-pencil-square"></i>
            </button>

            <button class="btn btn-light btn-sm text-danger" onclick="deleteUser('${u.db_id}')">
            <i class="bi bi-trash3"></i>
            </button>

        </td>
    </tr>
    `
    })

    })



    function deleteUser(id){

    if(!confirm("Delete user?")) return

    fetch("/api/delete-user/"+id,{method:"DELETE"})
    .then(()=>document.getElementById("searchBtn").click())

    }


   function openEdit(user){
    document.getElementById("db_id").value = user.db_id
    document.getElementById("edit_id").value = user.id
    document.getElementById("edit_username").value = user.username
    document.getElementById("edit_branch").value = user.branch
    document.getElementById("edit_opt_lesson").checked = user.lesson_schedule
    document.getElementById("edit_opt_attendance").checked = user.attendance
    document.getElementById("edit_opt_accounts").checked = user.accounts
    document.getElementById("edit_opt_result").checked = user.result
    document.getElementById("edit_opt_qr").checked = user.qr_code



    new bootstrap.Modal(document.getElementById("editUserModal")).show()

    }

    document.getElementById("editUserForm").addEventListener("submit", async function(e) {
    e.preventDefault(); // Prevent the form from refreshing the page

    const form = e.target;

    // Collect form data
    const db_id = document.getElementById("db_id").value.trim();
    const id = document.getElementById("edit_id").value.trim();
    const username = document.getElementById("edit_username").value.trim();
    const branch = document.getElementById("edit_branch").value;

    // Collect option checkboxes
    const options = {};
    form.querySelectorAll("input[name='options']").forEach(opt => {
        options[opt.value] = opt.checked;
    });


    // Send data to the server
    try {
        const res = await fetch("/api/update-user", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({db_id, id, username, branch, ...options })
        });

        const data = await res.json();

        if (data.success) {
            alert("User Updated successfully!");

            // Close modal
            const editModal = bootstrap.Modal.getInstance(document.getElementById("editUserModal"));
            editModal.hide();

            // Reset form
            form.reset();

            // Refresh table
            document.getElementById("searchBtn").click();
        } else {
            alert("Error: " + (data.error || "Could not add user"));
        }
    } catch (err) {
        console.error(err);
        alert("An unexpected error occurred");
    }
});

    function openPassword(id){

    document.getElementById("password_user_id").value=id

    new bootstrap.Modal(document.getElementById("passwordModal")).show()

    }

    document.getElementById("passwordForm").addEventListener("submit", async function(e){
    e.preventDefault()

    const id = document.getElementById("password_user_id").value
    const password = document.getElementById("new_password").value

    const res = await fetch("/api/change-password",{
        method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id,password})
    })

    const data = await res.json();

    if (data.success) {
        alert("Password Changed successfully!");

        const passwordModal = bootstrap.Modal.getInstance(
            document.getElementById("passwordModal")
        );
        document.getElementById("new_password").value = "";
        passwordModal.hide();

    } else {
        alert("Error changing password");
    }

});

</script>

</body>
</html>
