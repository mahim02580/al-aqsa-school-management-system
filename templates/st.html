<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Student Dashboard | Al-Aqsa Islami Academy</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#f4f6f9;
    --sidebar:#ffffff;
    --card:#ffffff;
    --primary:#198754;
    --text:#1f2937;
    --muted:#6b7280;
}
[data-theme="dark"] {
    --bg:#0f172a;
    --sidebar:#020617;
    --card:#1e293b;
    --text:#e5e7eb;
    --muted:#94a3b8;
}

body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
}

.app-wrapper {
    display:flex;
    min-height:100vh;
}

/* Sidebar */
.sidebar {
    width:260px;
    background:var(--sidebar);
    position:fixed;
    top:0; bottom:0; left:0;
    z-index:100;
    display:flex;
    flex-direction:column;
    transition:.3s;
    border-right:1px solid rgba(0,0,0,.08);
}
.sidebar.hide {
    transform:translateX(-100%);
}
.sidebar h6 {
    padding:1rem;
    font-weight:600;
}
.sidebar a {
    padding:.75rem 1.25rem;
    margin:.25rem .75rem;
    border-radius:10px;
    display:flex;
    gap:.75rem;
    text-decoration:none;
    color:var(--text);
}
.sidebar a:hover {
    background:rgba(25,135,84,.08);
}
.sidebar a.active {
    background:rgba(25,135,84,.15);
    color:var(--primary);
}

.sidebar-footer {
    margin-top:auto;
    padding:1rem;
}

/* Main */
.main {
    margin-left:260px;
    padding:1rem;
    width:100%;
}
@media(max-width:768px){
    .main { margin-left:0; }
}

/* Cards */
.card-ui {
    background:var(--card);
    border-radius:16px;
    padding:1rem;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* Filters */
.filter-btn.active {
    background:var(--primary);
    color:#fff;
}

/* Attendance Calendar */
.calendar {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:.5rem;
}
.day {
    padding:.75rem;
    border-radius:10px;
    text-align:center;
    font-size:.9rem;
}
.present { background:#16a34a; color:#fff; }
.leave   { background:#facc15; }
.absent  { background:#dc2626; color:#fff; }

/* QR Button */
.qr-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--primary);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.5rem;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    z-index:999;
}
</style>
</head>

<body>

<div class="app-wrapper">

<!-- SIDEBAR -->
<div class="sidebar hide" id="sidebar">
    <h6>📘 Student Panel</h6>

    <a href="#" class="active" onclick="navigate(this,'home')">
        <i class="bi bi-house"></i> Home
    </a>
    <a href="#" onclick="navigate(this,'curriculum')">
        <i class="bi bi-journal-bookmark"></i> Curriculum
    </a>
    <a href="#" onclick="navigate(this,'attendance')">
        <i class="bi bi-calendar-check"></i> Attendance
    </a>
    <a href="#" onclick="navigate(this,'result')">
        <i class="bi bi-bar-chart"></i> Result
    </a>
    <a href="#" onclick="navigate(this,'fees')">
        <i class="bi bi-wallet2"></i> Fees
    </a>

    <!-- User -->
    <div class="sidebar-footer dropdown">
        <a href="#" data-bs-toggle="dropdown" class="d-flex align-items-center gap-2">
            <img src="/static/img/avatar.png" width="36" class="rounded-circle">
            <strong>Ayaan</strong>
        </a>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item">Profile</a></li>
            <li><a class="dropdown-item">Change Password</a></li>
            <li><a class="dropdown-item text-danger">Logout</a></li>
        </ul>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <button class="btn btn-outline-success d-md-none mb-2" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>
    <div id="content"></div>
</div>

</div>

<!-- QR Scanner Button -->
<div class="qr-btn" onclick="openQRScanner()">
    <i class="bi bi-qr-code-scan"></i>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const subjects = ['Arabic','Bengali','English','Math'];

/* Sidebar */
function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('hide');
}
function navigate(el,section){
    document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
    el.classList.add('active');
    if(section==='home') renderHome();
    if(section==='curriculum') renderCurriculum();
    if(section==='attendance') renderAttendance();
}

/* Helpers */
function subjectButtons(callback){
    return subjects.map(s =>
        `<button class="btn btn-outline-success filter-btn m-1"
        onclick="${callback}('${s}',this)">${s}</button>`
    ).join('');
}

/* HOME */
function renderHome(){
document.getElementById('content').innerHTML = `
<div class="container-fluid">
<div class="row g-3">

<div class="col-12">
<div class="card-ui">
<h6>📢 Latest Notice</h6>
<p>School will remain closed on Friday.</p>
</div>
</div>

<div class="col-12">
${subjectButtons('homeSubject')}
</div>

<div class="col-md-6 col-12">
<div class="card-ui">
<h6>📘 Today's Curriculum</h6>
<p>Lesson content will appear here.</p>
</div>
</div>

<div class="col-md-6 col-12">
<div class="card-ui ratio ratio-16x9">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</div>
</div>

</div>
</div>`;
}
function homeSubject(subject,btn){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

/* CURRICULUM */
function renderCurriculum(){
const months = [
 'January','February','March','April','May','June',
 'July','August','September','October','November','December'
];
document.getElementById('content').innerHTML = `
<div class="container-fluid">
<div class="mb-2">
${months.map(m=>`
<button class="btn btn-outline-success filter-btn m-1"
onclick="selectMonth('${m}',this)">${m}</button>`).join('')}
</div>
<div id="days"></div>
</div>`;
}

function selectMonth(month,btn){
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

let daysInMonth = 31;
let html = '';

for(let d=1; d<=daysInMonth; d++){
html += `
<div class="card-ui mb-2">
<strong>${String(d).padStart(2,'0')} ${month} 2026</strong>
<div class="mt-2">
${subjectButtons('selectSubject')}
</div>
<div class="row g-3 mt-2 d-none subject-content">
<div class="col-md-6 col-12">
<div class="card-ui">Curriculum details</div>
</div>
<div class="col-md-6 col-12">
<div class="card-ui ratio ratio-16x9">
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>
</div>
</div>
</div>`;
}
document.getElementById('days').innerHTML = html;
}

function selectSubject(subject,btn){
const card = btn.closest('.card-ui');
card.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
card.querySelector('.subject-content').classList.remove('d-none');
}

/* ATTENDANCE */
function renderAttendance(){
let days = Array.from({length:30},(_,i)=>i+1);
document.getElementById('content').innerHTML = `
<div class="card-ui">
<h6>📅 Attendance Calendar</h6>
<div class="calendar mt-3">
${days.map(d=>{
const status=['present','leave','absent'][d%3];
return `<div class="day ${status}">${d}</div>`;
}).join('')}
</div>
</div>`;
}

/* QR SCANNER */
function openQRScanner(){
const modal = document.createElement('div');
modal.innerHTML = `
<div class="modal fade show d-block" style="background:rgba(0,0,0,.7)">
<div class="modal-dialog modal-fullscreen">
<div class="modal-content">
<div class="modal-header">
<h5>Scan QR Code</h5>
<button class="btn-close" onclick="this.closest('.modal').remove()"></button>
</div>
<div class="modal-body">
<div id="qr-reader" style="width:100%"></div>
</div>
</div>
</div>
</div>`;
document.body.appendChild(modal);

const qr = new Html5Qrcode("qr-reader");
qr.start({facingMode:"environment"},{fps:10,qrbox:250},
decoded => window.location.href = decoded
);
}

/* Default */
renderHome();
</script>

</body>
</html>
