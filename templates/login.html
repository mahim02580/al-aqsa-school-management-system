<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Al-Aqsa Islami Academy | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css')}}" rel="stylesheet"/>
</head>

<body>
<div class="dark-toggle">
    <i class="bi bi-moon-stars-fill fs-4" id="themeToggle"></i>
</div>

<div class="login-card text-center">
    <form method="POST" action="{{ url_for('login') }}">
        <img src="{{url_for('static', filename='img/al-aqsa-logo.png')}}" alt="School Logo" width="110" class="mb-3">

        <h4 class="fw-semibold">Al-Aqsa Islami Academy</h4>
        <p class="text-muted mb-4">Login</p>

        <!-- Role Selection -->
        <div class="btn-group w-100 mb-3" role="group">
            <input type="radio" class="btn-check" name="role" id="admin" value="admin" checked>
            <label class="btn btn-outline-primary role-btn" for="admin">Admin</label>

            <input type="radio" class="btn-check" name="role" id="teacher" value="teacher">
            <label class="btn btn-outline-primary role-btn" for="teacher">Teacher</label>

            <input type="radio" class="btn-check" name="role" id="guardian" value="guardian">
            <label class="btn btn-outline-primary role-btn" for="guardian">Guardian</label>
        </div>

        <div class="form-floating mb-3">
            <input name="username" class="form-control" placeholder="Username" required>
            <label>Username</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <label>Password</label>
        </div>
        {% with messages = get_flashed_messages() %}
        {% for message in messages %}
        <p id="wrong-credential-message"> {{message}}</p>
        {% endfor %}
        {% endwith %}

        <button class="btn btn-success w-100 py-2">Login</button>
    </form>
</div>

<script src="{{url_for('static', filename='js/script.js')}}">

</script>
</body>
</html>
