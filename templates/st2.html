<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Student Dashboard | Al-Aqsa Islami Academy</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f4f6f9;
  --sidebar:#ffffff;
  --card:#ffffff;
  --primary:#198754;
  --text:#1f2937;
  --muted:#6b7280;
}
[data-theme="dark"]{
  --bg:#0f172a;
  --sidebar:#020617;
  --card:#1e293b;
  --text:#e5e7eb;
  --muted:#94a3b8;
}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
}
.app{
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:var(--sidebar);
  position:fixed;
  top:0; bottom:0; left:0;
  display:flex;
  flex-direction:column;
  transition:.3s;
  z-index:100;
  border-right:1px solid rgba(0,0,0,.1);
}
.sidebar.min{
  width:80px;
}
.sidebar h6{
  padding:1rem;
  font-weight:600;
}
.sidebar.min .sidebar-title,
.sidebar.min span.label{
  display:none;
}

.sidebar a{
  display:flex;
  align-items:center;
  gap:.75rem;
  padding:.75rem 1rem;
  margin:.25rem .5rem;
  border-radius:10px;
  color:var(--text);
  text-decoration:none;
}
.sidebar a:hover{
  background:rgba(25,135,84,.08);
}
.sidebar a.active{
  background:rgba(25,135,84,.18);
  color:var(--primary);
}
.sidebar-footer{
  margin-top:auto;
  padding:.75rem;
}

/* Main */
.main{
  margin-left:260px;
  padding:1rem;
  width:100%;
  transition:.3s;
}
.sidebar.min ~ .main{
  margin-left:80px;
}
@media(max-width:768px){
  .main{margin-left:0}
}

/* Cards */
.card-ui{
  background:var(--card);
  border-radius:16px;
  padding:1rem;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* Filters */
.filter-btn.active{
  background:var(--primary);
  color:#fff;
}

/* Curriculum dropdown */
.day-row{
  cursor:pointer;
}
.day-row i{
  transition:.3s;
}
.day-row.open i{
  transform:rotate(180deg);
}

/* Attendance */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:.5rem;
}
.cal-head{
  font-weight:600;
  text-align:center;
}
.day{
  padding:.75rem;
  border-radius:10px;
  text-align:center;
}
.present{background:#16a34a;color:#fff}
.leave{background:#facc15}
.absent{background:#dc2626;color:#fff}

/* QR */
.qr-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--primary);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
  z-index:999;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.sidebar.min .d-flex{
  justify-content:center !important;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="d-flex align-items-center justify-content-between px-3 py-3">
  <h6 class="mb-0 sidebar-title">📘 Student</h6>
  <button class="btn btn-outline-success btn-sm" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>
</div>



  <a href="#" class="active" onclick="nav(this,'home')">
    <i class="bi bi-house"></i><span class="label">Home</span>
  </a>
  <a href="#" onclick="nav(this,'curriculum')">
    <i class="bi bi-journal-bookmark"></i><span class="label">Curriculum</span>
  </a>
  <a href="#" onclick="nav(this,'attendance')">
    <i class="bi bi-calendar-check"></i><span class="label">Attendance</span>
  </a>
  <a href="#"><i class="bi bi-bar-chart"></i><span class="label">Result</span></a>
  <a href="#"><i class="bi bi-wallet2"></i><span class="label">Fees</span></a>

  <!-- USER -->
  <div class="sidebar-footer dropdown">
    <a href="#" data-bs-toggle="dropdown" class="d-flex align-items-center gap-2 w-100">
      <img src="/static/img/avatar.png" width="36" class="rounded-circle">
      <span class="label flex-grow-1">Ayaan</span>
      <i class="bi bi-chevron-down label"></i>
    </a>
    <ul class="dropdown-menu w-100 shadow">
      <li><a class="dropdown-item">Profile</a></li>
      <li><a class="dropdown-item">Change Password</a></li>
      <li><a class="dropdown-item text-danger">Logout</a></li>
    </ul>
  </div>

</div>

<!-- MAIN -->
<div class="main">
  <div id="content"></div>
</div>

</div>

<!-- QR -->
<div class="qr-btn" onclick="openQR()">
  <i class="bi bi-qr-code-scan"></i>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const subjects=["Arabic","Bengali","English","Math"];
const monthDays={January:31,February:28,March:31,April:30,May:31,June:30,July:31,August:31,September:30,October:31,November:30,December:31};

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("min");
}
function nav(el,sec){
  document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"));
  el.classList.add("active");
  sec==="home"?home():sec==="curriculum"?curriculum():attendance();
}

/* HOME */
function home(){
document.getElementById("content").innerHTML=`
<div class="container-fluid">
<div class="row g-3">
<div class="col-12">
<div class="card-ui">
<h6>📢 Latest Notice</h6>
<p>School closed on Friday.</p>
</div>
</div>

<div class="col-12">
${subjects.map((s,i)=>`<button class="btn btn-outline-success filter-btn m-1 ${i==0?'active':''}" onclick="activate(this)">${s}</button>`).join("")}
</div>

<div class="col-md-6 col-12">
<div class="card-ui" style="height:100%">
<h6>📘 Today's Curriculum</h6>
<p>Lesson content here.</p>
</div>
</div>

<div class="col-md-6 col-12">
<div class="card-ui ratio ratio-16x9">
<iframe src="https://www.facebook.com/plugins/video.php?height=315&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F928857762831195%2F&show_text=false&width=560&t=0" allowfullscreen></iframe>

</div>
</div>
</div>
</div>`;
}
function activate(btn){
  btn.parentElement.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}


/* CURRICULUM (NEW SEARCH SYSTEM) */
function curriculum(){
document.getElementById("content").innerHTML=`
<div class="container-fluid">

<div class="card-ui mb-4 p-4 text-center">

<h4 class="mb-3">📘 Search Curriculum</h4>

<div class="row justify-content-center g-3">

<div class="col-md-4 col-12">
<input type="date" id="searchDate" class="form-control form-control-lg">
</div>

<div class="col-md-4 col-12">
<select id="searchSubject" class="form-select form-select-lg">
${subjects.map((s,i)=>`<option value="${s}" ${i==0?'selected':''}>${s}</option>`).join("")}
</select>
</div>

<div class="col-md-3 col-12">
<button class="btn btn-success btn-lg w-100 fw-bold shadow-sm" onclick="searchCurriculum()">
<i class="bi bi-search"></i> Search
</button>
</div>

</div>
</div>

<div id="searchResult"></div>

</div>`;
}

/* Helper Function*/
function searchCurriculum(){

const date = document.getElementById("searchDate").value;
const subject = document.getElementById("searchSubject").value;

if(!date){
alert("Please select a date first.");
return;
}

/*
In real system:
Fetch from Flask backend like:
fetch(`/api/curriculum?date=${date}&subject=${subject}`)
*/

document.getElementById("searchResult").innerHTML=`
<div class="row g-4 align-items-stretch">

<div class="col-md-6 col-12">
<div class="card-ui h-100 text-center p-4" style="border:3px solid var(--primary); animation:fadeIn .5s ease;">
<h5 class="mb-3">✨ ${subject} - ${date}</h5>
<p style="font-size:1.1rem;">
Today we learn something amazing! 🌟<br><br>
Lesson content for <strong>${subject}</strong> on <strong>${date}</strong>.
</p>
</div>
</div>

<div class="col-md-6 col-12">
<div class="card-ui ratio ratio-16x9 shadow-sm" style="border:3px solid var(--primary); animation:fadeIn .5s ease;">
<iframe src="https://www.facebook.com/plugins/video.php?height=315&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F928857762831195%2F&show_text=false&width=560&t=0" allowfullscreen></iframe>
</div>
</div>

</div>`;
}


/* ATTENDANCE */
function attendance(){
let days=[...Array(31).keys()].map(i=>i+1);
document.getElementById("content").innerHTML=`
<div class="card-ui">
<div class="d-flex justify-content-between align-items-center mb-2">
<button class="btn btn-outline-success"><i class="bi bi-chevron-left"></i></button>
<strong>January 2026</strong>
<button class="btn btn-outline-success"><i class="bi bi-chevron-right"></i></button>
</div>
<div class="calendar">
${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="cal-head">${d}</div>`).join("")}
${days.map(d=>`<div class="day ${["present","leave","absent"][d%3]}">${d}</div>`).join("")}
</div>
</div>`;
}

/* QR */
function openQR(){
alert("QR Scanner backend connected");
}

home();
</script>

</body>
</html>
