<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Tutorial Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6fb;
        font-family:Inter,sans-serif;
        margin:0;
        }

        .header{
        position:fixed;
        top:0;
        left:0;
        right:0;

        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:14px 18px;

        background:white;
        box-shadow:0 2px 10px rgba(0,0,0,.06);

        z-index:1000;
        }

        .title{
        font-size:18px;
        font-weight:600;
        }

        .page{
        margin-top:85px;
        max-width:900px;
        margin-left:auto;
        margin-right:auto;
        padding:14px;
        }

        .card-ui{
        background:white;
        border-radius:14px;
        padding:18px;
        box-shadow:0 4px 14px rgba(0,0,0,.06);
        margin-bottom:20px;
        }

        .link-box{
        background:#f9fafc;
        padding:10px;
        border-radius:8px;
        word-break:break-all;
        font-size:14px;
        }

        /* Responsive Video */

        .video-wrapper{
        margin-top:10px;
        border-radius:12px;
        overflow:hidden;
        }

        /* Mobile Improvements */

        @media (max-width:576px){

        .header{
        padding:12px 14px;
        }

        .title{
        font-size:16px;
        }

        .page{
        padding:10px;
        }

        .card-ui{
        padding:14px;
        }

        }

    </style>

</head>

<body>

<div class="header">

    <div class="title">
        Tutorial Management
    </div>

    <button class="btn btn-success add-btn"
            data-bs-toggle="modal"
            data-bs-target="#uploadModal">

        <i class="bi bi-plus-lg"></i>

    </button>

</div>

<div class="page">

    <!-- SEARCH CARD -->

    <div class="card-ui">

        <div class="row g-2">

            <div class="col-12 col-md-9">

                <label class="form-label">Video ID</label>

                <input id="videoId"
                       class="form-control"
                       placeholder="Enter video ID">

            </div>

            <div class="col-12 col-md-3 d-flex align-items-end">

                <button id="searchBtn"
                        class="btn btn-success w-100">

                    Search

                </button>

            </div>

        </div>

    </div>


    <!-- RESULT CARD -->

    <div id="videoResult"
         style="display:none;"
         class="card-ui">

        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <h6 class="m-0">
                Video Information
            </h6>

            <button
                    class="btn btn-sm btn-success"
                    id="editBtn"
                    data-bs-toggle="modal"
                    data-bs-target="#editModal">

                Edit

            </button>

        </div>

        <div class="mb-3">

            <strong class="d-block mb-1">Video Link</strong>

            <div id="videoLink" class="link-box"></div>

        </div>

        <!-- Responsive Video -->

        <div class="ratio ratio-16x9 video-wrapper">

            <iframe
                    id="videoFrame"
                    allowfullscreen>

            </iframe>

        </div>

    </div>

</div>


<!-- UPLOAD MODAL -->

<div class="modal fade" id="uploadModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Upload Lesson Tutorials
                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form action="{{ url_for('upload_videos') }}" method="POST" enctype="multipart/form-data">

                    <div class="mb-3">

                        <label class="form-label">Class</label>

                        <select name="class_name" class="form-select">
                            <option>Play</option>
                            <option>Nursery</option>
                            <option>One</option>
                            <option>Two</option>
                            <option>Three</option>
                            <option>Four</option>
                            <option>Five</option>
                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Upload Excel (Must contain 'ID' and 'Link' Column)</label>

                        <input type="file"
                               name="excel_file"
                               class="form-control">

                    </div>

                    <button class="btn btn-success w-100">
                        Submit
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>


<!-- EDIT MODAL -->

<div class="modal fade" id="editModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Edit Video Link
                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form id="updateForm">

                    <input type="hidden" id="edit_id">

                    <label class="form-label">
                        Video Link
                    </label>

                    <input
                            type="text"
                            id="edit_link"
                            class="form-control"
                            required>

                    <button class="btn btn-success w-100 mt-3">
                        Update
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

    let currentVideoId=null

    document.getElementById("searchBtn").addEventListener("click", async function(){

    const videoId=document.getElementById("videoId").value

    if(!videoId){
    alert("Enter Video ID")
    return
    }

    const response=await fetch("/api/get-video",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({
    id:videoId
    })

    })

    const data=await response.json()

    if(!data.success){
    alert("Video not found")
    return
    }

    currentVideoId=data.video.id

    document.getElementById("videoResult").style.display="block"

    document.getElementById("videoLink").innerText=data.video.video_link

    document.getElementById("videoFrame").src=data.video.video_link

    document.getElementById("edit_id").value=data.video.id

    document.getElementById("edit_link").value=data.video.video_link

    })


    document.getElementById("updateForm").addEventListener("submit", async function(e){

    e.preventDefault()

    const id=document.getElementById("edit_id").value
    const link=document.getElementById("edit_link").value

    await fetch("/api/update-video",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({
    video_id:id,
    video_link:link
    })

    })

    bootstrap.Modal.getInstance(document.getElementById("editModal")).hide()

    document.getElementById("searchBtn").click()

    })

</script>

</body>
</html>
