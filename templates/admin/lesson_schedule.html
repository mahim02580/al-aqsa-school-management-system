<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Lesson Schedule</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
        background:#f4f6fb;
        font-family:Inter,sans-serif;
        margin:0;
        }

        /* HEADER */

        .header{
        position:fixed;
        top:0;
        left:0;
        right:0;

        display:flex;
        justify-content:space-between;
        align-items:center;

        padding:14px 16px;

        background:white;

        box-shadow:0 2px 10px rgba(0,0,0,.06);

        z-index:1000;
        }

        .title{
        font-weight:600;
        font-size:18px;
        }

        .add-btn{
        border-radius:10px;
        }

        /* PAGE */

        .page{
        margin-top:70px;
        padding:14px;
        max-width:1100px;
        margin-left:auto;
        margin-right:auto;
        }

        /* CARD */

        .filter-card,
        .curriculum-card{
        background:white;
        padding:16px;
        border-radius:16px;
        box-shadow:0 4px 15px rgba(0,0,0,.05);
        margin-bottom:16px;
        }

        /* TABLE */

        .table-responsive{
        overflow-x:hidden;
        }

        .curriculum-table{
        width:100%;
        table-layout:fixed;
        }

        .curriculum-table th,
        .curriculum-table td{
        word-wrap:break-word;
        white-space:normal;
        }

        .curriculum-table th{
        font-size:14px;
        color:#666;
        font-weight:600;
        }

        .curriculum-table td{
        vertical-align:middle;
        }

        .edit-btn{
        border-radius:8px;
        }

        /* DROP AREA */

        .drop-area{
        border:2px dashed #cbd5e1;
        border-radius:12px;
        padding:30px;
        text-align:center;
        cursor:pointer;
        background:#f9fafc;
        }

        /* MOBILE IMPROVEMENTS */

        @media (max-width:768px){

        .header{
        padding:12px;
        }

        .title{
        font-size:16px;
        }

        }

    </style>

</head>

<body>
<div class="container p-0">
    <!-- HEADER -->

    <div class="header">

        <div class="title">
            Lesson Schedule
        </div>

        <button class="btn btn-success add-btn"
                data-bs-toggle="modal"
                data-bs-target="#uploadModal">

            <i class="bi bi-plus-lg"></i>

        </button>

    </div>

    <div class="page">

        <!-- FILTERS -->

        <div class="filter-card">

            <div class="row g-2">

                <div class="col-md-4">

                    <select id="classSelect" class="form-select">
                        <option>Select Class</option>
                        <option>Play</option>
                        <option>Nursery</option>
                        <option>One</option>
                        <option>Two</option>
                        <option>Three</option>
                        <option>Four</option>
                        <option>Five</option>
                    </select>

                </div>

                <div class="col-md-4">

                    <input id="dateSelect" type="date" class="form-control">

                </div>

                <div class="col-md-4">

                    <button id="searchBtn" class="btn btn-success w-100">
                        Search
                    </button>

                </div>

            </div>

        </div>

        <!-- CURRICULUM TABLE -->
        <div class="curriculum-card">

            <div class="table-responsive">

                <table class="table curriculum-table align-middle">

                    <thead>

                    <tr>
                        <th style="width:30%;">Subject</th>
                        <th style="width:50%;">Topic</th>
                        <th style="width:20%;" class="text-end">Action</th>
                    </tr>

                    </thead>

                    <tbody id="curriculumBody"></tbody>

                </table>

            </div>

        </div>
    </div>

    <!-- UPLOAD MODAL -->

    <div class="modal fade" id="uploadModal">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Upload Lesson Schedule
                    </h5>

                    <button class="btn-close" data-bs-dismiss="modal"></button>

                </div>

                <div class="modal-body">

                    <form action="{{ url_for('upload_curriculum') }}" method="POST" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">Class</label>

                            <select name="class_name" class="form-select">
                                <option>Play</option>
                                <option>Nursery</option>
                                <option>One</option>
                                <option>Two</option>
                                <option>Three</option>
                                <option>Four</option>
                                <option>Five</option>
                            </select>

                        </div>


                        <div class="mb-3">
                            <label class="form-label">Subject</label>

                            <select name="subject" class="form-select">
                                <option>Arabic</option>
                                <option>Bangla</option>
                                <option>English</option>
                                <option>Math</option>
                            </select>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">Upload Excel</label>

                            <input type="file" name="excel_file" class="form-control">

                        </div>


                        <button class="btn btn-success w-100">
                            Submit
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- EDIT MODAL -->

    <div class="modal fade" id="editModal">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Edit Lesson Schedule
                    </h5>

                    <button class="btn-close" data-bs-dismiss="modal"></button>

                </div>

                <div class="modal-body">

                    <form id="updateForm">

                        <input type="hidden" name="id" id="edit_id">

                        <div class="mb-3">
                            <label class="form-label">Topic</label>
                            <input type="text" name="topic" id="edit_topic" class="form-control">
                        </div>

                        <button class="btn btn-success w-100">
                            Update
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>

    document.getElementById("searchBtn").addEventListener("click", async function(){

    const className = document.getElementById("classSelect").value
    const date = document.getElementById("dateSelect").value

    const response = await fetch("/api/search-curriculum",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({
    class:className,
    date:date
    })

    })

    const result = await response.json()

    const tbody = document.getElementById("curriculumBody")

    tbody.innerHTML = ""

    result.data.forEach(row=>{

    tbody.innerHTML += `
    <tr>

    <td>${row.subject}</td>

    <td>${row.topic}</td>

    <td class="text-end">

    <button
    class="btn btn-success btn-sm editBtn"
    data-id="${row.id}"
    data-topic="${row.topic}"
    data-bs-toggle="modal"
    data-bs-target="#editModal">

    Edit

    </button>

    </td>

    </tr>
    `

    })

    attachEditEvents()

    })


    function attachEditEvents(){

    document.querySelectorAll(".editBtn").forEach(btn=>{

    btn.addEventListener("click",function(){

    document.getElementById("edit_id").value=this.dataset.id
    document.getElementById("edit_topic").value=this.dataset.topic

    })

    })

    }


    document.getElementById("updateForm").addEventListener("submit", async function(e){

    e.preventDefault()

    const data={

    id:document.getElementById("edit_id").value,
    topic:document.getElementById("edit_topic").value

    }

    await fetch("/api/update-curriculum",{

    method:"POST",
    headers:{
    "Content-Type":"application/json"
    },
    body:JSON.stringify(data)

    })

    bootstrap.Modal.getInstance(document.getElementById("editModal")).hide()

    document.getElementById("searchBtn").click()

    })

</script>
</body>
</html>
