<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>QR Code Scanner</title>
    <link href="{{url_for('static', filename='/img/al-aqsa-icon.jpg')}}" rel="icon">
    <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

    <style>

        body{
        margin:0;
        font-family:Arial;
        background:#ffffff;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        }

        .card{
        background:white;
        padding:20px;
        border-radius:16px;
        width:340px;
        text-align:center;
        box-shadow:0 10px 25px rgba(0,0,0,.3);
        }

        .title{
        font-size:20px;
        font-weight:600;
        margin-bottom:10px;
        }

        #reader{
        width:100%;
        }

        .msg{
        margin-top:10px;
        font-size:14px;
        color:#555;
        }

    </style>

</head>

<body>

<div class="card">

    <div class="title">
        Scan QR Code on Book
    </div>

    <div id="reader"></div>

    <div id="msg" class="msg">
        Point Camera Towards QR Code
    </div>

</div>

<script>

    function startScanner(){

    const qrScanner = new Html5Qrcode("reader")

    qrScanner.start(

    { facingMode:"environment" },   // back camera

    {
    fps:15,
    qrbox:250
    },

    function(decodedText){

    document.getElementById("msg").innerText = "Opening lesson tutorial..."

    qrScanner.stop()

    setTimeout(function(){

    window.location.href="/video/" + decodedText

    },500)

    },

    function(error){}

    )

    }

    startScanner()

</script>

</body>

</html>
