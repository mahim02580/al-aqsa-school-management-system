<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lesson Tutorial</title>

    <link href="{{url_for('static', filename='/img/al-aqsa-icon.jpg')}}" rel="icon">

    <style>

        body{
            background:#f4f6fb;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:20px;
            box-shadow:0 6px 20px rgba(0,0,0,.08);
            max-width:500px;
            width:100%;
            text-align:center;
        }

        .video-wrapper{
            position:relative;
            width:100%;
            overflow:hidden;
            border-radius:12px;
        }

        iframe{
            width:100%;
            height:280px;
            border:none;
            pointer-events:auto;
        }

        .title{
            font-size:20px;
            font-weight:600;
            margin-bottom:15px;
        }

    </style>

</head>

<body oncontextmenu="return false;">

<div class="card">

    <div class="title">
        Al-Aqsa Islami Academy Lesson Tutorial
    </div>

    <div class="video-wrapper">

        <iframe
            src="{{ video_link }}?modestbranding=1&rel=0&controls=1&disablekb=1&fs=0"
            allowfullscreen="false"
            sandbox="allow-scripts allow-same-origin"
            referrerpolicy="strict-origin-when-cross-origin">
        </iframe>

    </div>

</div>

<script>

    // Disable right click
    document.addEventListener("contextmenu", event => event.preventDefault());

    // Disable some keyboard shortcuts
    document.addEventListener("keydown", function(e){

        // F12
        if(e.key === "F12"){
            e.preventDefault();
        }

        // Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.key === "I"){
            e.preventDefault();
        }

        // Ctrl+U
        if(e.ctrlKey && e.key === "u"){
            e.preventDefault();
        }

    });

</script>

</body>

</html>
