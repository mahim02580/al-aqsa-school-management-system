<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>User Management</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body{
        margin:0;
        font-family:Inter,system-ui,Arial;
        background:#f4f6fb;
        }

        /* HEADER */

        .header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:14px 18px;
        background:white;
        border-bottom:1px solid #eee;
        font-weight:600;
        font-size:18px;
        }

        .add-btn{
        background:#28a745;
        border:none;
        width:40px;
        height:40px;
        border-radius:50%;
        color:white;
        font-size:18px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        /* MAIN */

        .main{
        padding:18px;
        }

        /* CARD */

        .card{
        background:white;
        border-radius:18px;
        padding:16px;
        box-shadow:0 6px 16px rgba(0,0,0,.05);
        }

        /* TABLE */

        table{
        width:100%;
        border-collapse:collapse;
        }

        th{
        text-align:left;
        font-size:13px;
        color:#888;
        padding:10px;
        }

        td{
        padding:12px 10px;
        border-top:1px solid #f1f1f1;
        font-size:14px;
        }

        .role{
        padding:4px 10px;
        border-radius:8px;
        font-size:12px;
        color:white;
        }

        .role.service_admin{background:#ff9800;}
        .role.teacher{background:#2196f3;}
        .role.guardian{background:#9c27b0;}

        .actions{
        display:flex;
        gap:10px;
        }

        .icon-btn{
        border:none;
        background:#f1f3f7;
        width:34px;
        height:34px;
        border-radius:8px;
        cursor:pointer;
        }

        /* MODAL */

        .modal{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,.35);
        display:none;
        align-items:center;
        justify-content:center;
        }

        .modal-content{
        background:white;
        border-radius:18px;
        padding:20px;
        width:90%;
        max-width:400px;
        }

        .modal-title{
        font-size:18px;
        font-weight:600;
        margin-bottom:16px;
        }

        .form-group{
        margin-bottom:12px;
        }

        input, select{
        width:100%;
        padding:10px;
        border-radius:8px;
        border:1px solid #ddd;
        font-size:14px;
        }

        .save-btn{
        width:100%;
        margin-top:10px;
        background:#28a745;
        color:white;
        border:none;
        padding:10px;
        border-radius:10px;
        font-size:14px;
        cursor:pointer;
        }

    </style>

</head>

<body>

<div class="header">

    User Management

    <button class="add-btn" onclick="openModal()">
        <i class="fa-solid fa-plus"></i>
    </button>

</div>

<div class="main">

    <div class="card">

        <table>

            <thead>

            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Branch</th>
                <th>Actions</th>
            </tr>

            </thead>

            <tbody id="userTable">

            <tr>
                <td>Ahmed Khan</td>
                <td>ahmed@email.com</td>
                <td><span class="role service_admin">Service Admin</span></td>
                <td>Main Branch</td>
                <td class="actions">
                    <button class="icon-btn"><i class="fa-solid fa-pen"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>

            <tr>
                <td>Ali Hassan</td>
                <td>ali@email.com</td>
                <td><span class="role teacher">Teacher</span></td>
                <td>City Branch</td>
                <td class="actions">
                    <button class="icon-btn"><i class="fa-solid fa-pen"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>

            <tr>
                <td>Fatima Noor</td>
                <td>fatima@email.com</td>
                <td><span class="role guardian">Guardian</span></td>
                <td>Main Branch</td>
                <td class="actions">
                    <button class="icon-btn"><i class="fa-solid fa-pen"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- ADD USER MODAL -->

<div class="modal" id="userModal">

    <div class="modal-content">

        <div class="modal-title">
            Add New User
        </div>

        <div class="form-group">
            <input type="text" placeholder="Full Name">
        </div>

        <div class="form-group">
            <input type="email" placeholder="Email">
        </div>

        <div class="form-group">
            <input type="password" placeholder="Password">
        </div>

        <div class="form-group">
            <select>
                <option value="">Select Role</option>
                <option>Service Admin</option>
                <option>Teacher</option>
                <option>Guardian</option>
            </select>
        </div>

        <div class="form-group">
            <select>
                <option value="">Select Branch</option>
                <option>Main Branch</option>
                <option>City Branch</option>
            </select>
        </div>

        <button class="save-btn">
            Save User
        </button>

    </div>

</div>

<script>

    function openModal(){
    document.getElementById("userModal").style.display="flex"
    }

    window.onclick=function(e){
    const modal=document.getElementById("userModal")
    if(e.target==modal){
    modal.style.display="none"
    }
    }

</script>

</body>
</html>
