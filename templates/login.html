<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Al-Aqsa Islami Academy | Login</title>

    <link href="{{url_for('static', filename='/img/al-aqsa-logo.png')}}" rel="icon">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>

        body{
            font-family: 'Poppins', sans-serif;
            background:#f5f7fb;
        }

        /* mobile app container */
        .app-container{
            max-width:420px;
            margin:auto;
        }

        /* login card */
        .login-card{
            padding:30px 20px;
            border-radius:20px;
            background:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        /* sticky header */
        .header{
            padding:20px 15px 10px;
        }

        /* logo */
        .logo{
            width:90px;
        }

        /* better mobile input size */
        .form-control{
            height:50px;
            font-size:15px;
        }

        /* login button */
        .login-btn{
            height:50px;
            font-size:16px;
            border-radius:10px;
        }

        /* prevent keyboard overlap */
        @media (max-width:768px){
            body{
                min-height:100vh;
                display:flex;
                flex-direction:column;
                justify-content:flex-start;
            }
        }

    </style>
</head>

<body>

<div class="container-fluid min-vh-50 d-flex flex-column justify-content-start align-items-center">

    <div class="app-container w-100">

        <!-- Header -->
        <div class="text-center header">

            <img src="{{url_for('static', filename='img/al-aqsa-logo.png')}}" class="logo mb-3">

            <h3 class="fw-semibold mb-1">
                Al-Aqsa Islami Academy
            </h3>

            <h4 class="text-muted medium">
                Login
            </h4>

        </div>

        <!-- Login Card -->
        <div class="login-card">

            <form method="POST" action="{{ url_for('login') }}">

                <div class="form-floating mb-3">
                    <input name="username"
                           class="form-control"
                           placeholder="Username"
                           required>
                    <label>Username</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Password"
                           required>
                    <label>Password</label>
                </div>

                {% with messages = get_flashed_messages() %}
                {% for message in messages %}
                <p class="text-danger text-center small">{{message}}</p>
                {% endfor %}
                {% endwith %}

                <button class="btn btn-success w-100 login-btn">
                    Login
                </button>

            </form>

        </div>

    </div>
</div>

</body>
</html>
